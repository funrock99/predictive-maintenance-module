<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PdM Dashboard | Predictive Maintenance</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: rgba(25, 28, 41, 0.6);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #10b981;
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(15, 17, 26, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
        }

        .status-badge.alert {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: currentColor;
            box-shadow: 0 0 8px currentColor;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .container {
            padding: 40px;
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .current-value {
            font-size: 2rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        
        .unit {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .chart-container {
            flex: 1;
            position: relative;
            min-height: 200px;
            width: 100%;
        }

        /* Toast Container */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-icon {
            font-size: 1.2rem;
        }

        .toast-content {
            display: flex;
            flex-direction: column;
        }

        .toast-title {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .toast-desc {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1>PdM Real-time Dashboard</h1>
        <div style="display:flex; gap: 16px;">
            <div class="status-badge" id="source-status" style="border-color: rgba(59, 130, 246, 0.4); color: #60a5fa; background: rgba(59, 130, 246, 0.1);">
                <span id="source-text">Source: --</span>
            </div>
            <div class="status-badge" id="ai-status" style="border-color: rgba(167, 139, 250, 0.5); color: #a78bfa; background: rgba(167, 139, 250, 0.1);">
                <span id="ai-score-text">AI Score: 0.0</span>
            </div>
            <div class="status-badge" id="global-status">
                <div class="pulse"></div>
                <span id="status-text">System Normal</span>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Temperature Card -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Temperature</h2>
                <div class="current-value" id="val-temp">-- <span class="unit">°C</span></div>
            </div>
            <div class="chart-container">
                <canvas id="chart-temp"></canvas>
            </div>
        </div>

        <!-- Pressure Card -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Pressure</h2>
                <div class="current-value" id="val-press">-- <span class="unit">kPa</span></div>
            </div>
            <div class="chart-container">
                <canvas id="chart-press"></canvas>
            </div>
        </div>

        <!-- Vibration Card -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Vibration</h2>
                <div class="current-value" id="val-vib">-- <span class="unit">Hz</span></div>
            </div>
            <div class="chart-container">
                <canvas id="chart-vib"></canvas>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="/static/app.js?v=3"></script>
</body>
</html>
